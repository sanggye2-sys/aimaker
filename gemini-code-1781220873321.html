<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>심플 웹 계산기</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f2f5;
        }

        .calculator {
            background-color: #1e222b;
            padding: 24px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 320px;
        }

        .display {
            width: 100%;
            height: 80px;
            background-color: #14171e;
            border: none;
            outline: none;
            border-radius: 12px;
            margin-bottom: 20px;
            color: #ffffff;
            text-align: right;
            padding: 0 16px;
            font-size: 2rem;
            font-weight: 500;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            padding: 18px;
            font-size: 1.25rem;
            font-weight: 600;
            border: none;
            outline: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.1s ease;
            background-color: #2c313d;
            color: #ffffff;
        }

        button:active {
            transform: scale(0.95);
            opacity: 0.8;
        }

        /* 기능 버튼 (C, Backspace 등) */
        button.function {
            background-color: #3e4451;
            color: #abb2bf;
        }

        /* 연산자 버튼 (+, -, *, /, =) */
        button.operator {
            background-color: #4b6fff;
            color: #ffffff;
        }

        /* 등호 버튼은 색상을 다르게 */
        button.equal {
            background-color: #00ca72;
            color: #ffffff;
            grid-column: span 2; /* 가로로 2칸 차지 */
        }
    </style>
</head>
<body>

    <div class="calculator">
        <!-- 결과 화면 창 -->
        <input type="text" class="display" id="display" readonly value="0">
        
        <!-- 버튼 모음 -->
        <div class="buttons">
            <button class="function" onclick="clearDisplay()">C</button>
            <button class="function" onclick="deleteLast()">⌫</button>
            <button class="operator" onclick="appendOperator('/')">÷</button>
            <button class="operator" onclick="appendOperator('*')">×</button>

            <button onclick="appendNumber('7')">7</button>
            <button onclick="appendNumber('8')">8</button>
            <button onclick="appendNumber('9')">9</button>
            <button class="operator" onclick="appendOperator('-')">-</button>

            <button onclick="appendNumber('4')">4</button>
            <button onclick="appendNumber('5')">5</button>
            <button onclick="appendNumber('6')">6</button>
            <button class="operator" onclick="appendOperator('+')">+</button>

            <button onclick="appendNumber('1')">1</button>
            <button onclick="appendNumber('2')">2</button>
            <button onclick="appendNumber('3')">3</button>
            <button onclick="appendNumber('.')">.</button>

            <button onclick="appendNumber('0')">0</button>
            <button class="operator equal" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        let shouldResetDisplay = false;

        // 숫자 및 소수점 입력
        function appendNumber(number) {
            if (display.value === '0' || shouldResetDisplay) {
                display.value = number;
                shouldResetDisplay = false;
            } else {
                // 소수점 중복 입력 방지
                if (number === '.' && display.value.includes('.')) return;
                display.value += number;
            }
        }

        // 연산자 입력
        function appendOperator(operator) {
            shouldResetDisplay = false;
            const lastChar = display.value.slice(-1);
            
            // 마지막 글자가 이미 연산자라면 교체, 아니라면 추가
            if (['+', '-', '*', '/'].includes(lastChar)) {
                display.value = display.value.slice(0, -1) + operator;
            } else {
                display.value += operator;
            }
        }

        // 전체 지우기 (C)
        function clearDisplay() {
            display.value = '0';
        }

        // 하나만 지우기 (Backspace)
        function deleteLast() {
            if (display.value.length > 1) {
                display.value = display.value.slice(0, -1);
            } else {
                display.value = '0';
            }
        }

        // 계산 결과 도출 (=)
        function calculate() {
            try {
                // eval을 사용한 간단한 수식 계산 (화면에 표시된 수식을 그대로 계산)
                // 만약 빈 값이거나 비정상적인 수식이면 에러 처리
                if (display.value === '') return;
                
                // 계산결과 반영 (예: 2+3*5 -> 17)
                let result = eval(display.value);
                
                // 소수점 결과가 너무 길어질 경우를 대비해 8자리까지만 제한
                if (!Number.isInteger(result)) {
                    result = Math.round(result * 100000000) / 100000000;
                }
                
                display.value = result;
                shouldResetDisplay = true; // 다음 숫자 입력 시 새로 시작되도록 설정
            } catch (error) {
                display.value = 'Error';
                shouldResetDisplay = true;
            }
        }
    </script>
</body>
</html>
